<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyAgent · MCP 配置</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script>try { if (localStorage.getItem('myagent-theme') !== 'dark') document.documentElement.classList.add('theme-light'); } catch (e) { document.documentElement.classList.add('theme-light'); }</script>
<style>
  :root {
    --space-bg: #1e1e2e;
    --surface-glass: rgba(22, 22, 36, 0.96);
    --surface-glass2: rgba(40, 40, 60, 0.94);
    --surface-glass3: rgba(62, 63, 86, 0.78);
    --border-glass: rgba(205, 214, 244, 0.055);
    --border-accent: rgba(203, 166, 247, 0.22);
    --text-primary: #cdd6f4;
    --text-secondary: #a6adc8;
    --text-tertiary: #6c7086;
    --accent-gradient: linear-gradient(135deg, #b4befe 0%, #cba6f7 50%, #dac2f0 100%);
    --accent-glow: rgba(203, 166, 247, 0.28);
    --accent-brand-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
    --accent-brand-glow: rgba(108, 92, 231, 0.28);
    --shadow-brand-glow: 0 4px 24px rgba(108, 92, 231, 0.18);
    --border-brand-accent: rgba(124, 111, 247, 0.22);
    --code-surface-bg: #1c1d2e;
    --green-accent: #a6e3a1;
    --red-accent: #f38ba8;
    --sans: 'Plus Jakarta Sans', -apple-system, system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --radius-sm: 8px;
    --radius-md: 14px;
    --shadow-soft: 0 10px 44px rgba(0,0,0,0.38);
    --shadow-glow: 0 4px 24px rgba(203, 166, 247, 0.18);
  }
  :root.theme-light {
    --space-bg: #e4e9f2;
    --surface-glass: rgba(255, 255, 255, 0.93);
    --surface-glass2: rgba(255, 255, 255, 0.98);
    --surface-glass3: rgba(242, 245, 250, 0.98);
    --border-glass: rgba(0, 0, 0, 0.09);
    --text-primary: #0e0f1a;
    --text-secondary: #282a3a;
    --text-tertiary: #484a5e;
    --shadow-soft: 0 12px 40px rgba(0, 0, 0, 0.1), 0 2px 10px rgba(0, 0, 0, 0.04);
    --shadow-glow: 0 4px 22px rgba(99, 102, 241, 0.16);
    --accent-glow: rgba(99, 102, 241, 0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 14px; background: var(--space-bg); }
  body {
    font-family: var(--sans);
    background: var(--space-bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding-bottom: 3rem;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.09); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }
  ::-webkit-scrollbar-corner { background: transparent; }
  ::-webkit-scrollbar-button { width: 0; height: 0; display: none; }
  :root.theme-light ::-webkit-scrollbar-thumb { background: rgba(15, 23, 42, 0.08); border-radius: 8px; }
  :root.theme-light ::-webkit-scrollbar-thumb:hover,
  :root.theme-light ::-webkit-scrollbar-thumb:active { background: rgba(15, 23, 42, 0.22); }

  .neo { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .orb {
    position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.42;
    width: 460px; height: 460px; top: -8%; left: -6%; background: rgba(108, 92, 231, 0.12);
  }
  .orb2 {
    width: 340px; height: 340px; bottom: -4%; right: -4%; background: rgba(139, 92, 246, 0.1);
  }
  :root.theme-light .orb { opacity: 0.22; filter: blur(96px); }
  .grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 32px 32px;
  }
  :root.theme-light .grid {
    background-image:
      linear-gradient(rgba(0, 0, 0, 0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 0, 0, 0.035) 1px, transparent 1px);
  }

  .w { position: relative; z-index: 2; max-width: 900px; margin: 0 auto; padding: 2rem 1.25rem; }

  .hd { margin-bottom: 1rem; }
  .hd h1 {
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 0.35rem;
    background: linear-gradient(135deg, #f0eff5 0%, #c8c6d6 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  :root.theme-light .hd h1 {
    background: linear-gradient(135deg, #1f1f2e 0%, #4f46e5 55%, #6366f1 100%);
    -webkit-background-clip: text;
    background-clip: text;
  }
  .pth { font-size: 0.75rem; color: var(--text-tertiary); word-break: break-all; margin-bottom: 1rem; }

  .fh {
    font-size: 0.8rem;
    color: var(--text-secondary);
    line-height: 1.55;
    margin-bottom: 1rem;
  }
  .fh code {
    font-family: var(--mono);
    font-size: 0.78rem;
    padding: 0.12rem 0.35rem;
    border-radius: 5px;
    background: var(--code-surface-bg);
    border: 1px solid var(--border-glass);
    color: #c4bafc;
  }
  :root.theme-light .fh code {
    background: rgba(0,0,0,0.04);
    border-color: rgba(0,0,0,0.1);
  }

  .cd {
    background: var(--surface-glass3);
    border: 1px solid var(--border-glass);
    border-radius: var(--radius-md);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    padding: 1rem 1.15rem;
    box-shadow: var(--shadow-soft);
  }
  :root.theme-light .cd { box-shadow: var(--shadow-soft), 0 1px 0 rgba(255,255,255,0.75) inset; }

  .st {
    display: none;
    margin-bottom: 0.85rem;
    padding: 0.65rem;
    border-radius: var(--radius-sm);
    font-size: 0.85rem;
    font-weight: 500;
  }
  .st.e {
    display: block;
    background: rgba(243,139,168,0.12);
    border: 1px solid rgba(243,139,168,0.28);
    color: var(--red-accent);
  }
  .st.ok {
    display: block;
    background: rgba(166,227,161,0.12);
    border: 1px solid rgba(166,227,161,0.26);
    color: var(--green-accent);
  }
  :root.theme-light .st.e {
    background: rgba(254,226,226,0.85);
    border-color: rgba(243,139,168,0.35);
    color: #991b1b;
  }
  :root.theme-light .st.ok {
    background: rgba(209,250,229,0.9);
    border-color: rgba(166,227,161,0.35);
    color: #065f46;
  }

  .mono {
    font-family: var(--mono);
    font-size: 0.78rem;
    width: 100%;
    min-height: 420px;
    padding: 0.75rem;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-glass);
    background: var(--surface-glass2);
    color: var(--text-primary);
    resize: vertical;
    outline: none;
    transition: border-color 0.18s ease, box-shadow 0.18s ease;
  }
  .mono:focus {
    border-color: rgba(99,102,241,0.45);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.15), var(--shadow-glow);
  }
  :root.theme-light .mono {
    background: #fff;
    border-color: rgba(0,0,0,0.12);
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  :root.theme-light .mono:focus {
    box-shadow: 0 0 0 3px rgba(99,102,241,0.14);
  }

  .env-toolbar {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    gap: 0.75rem;
    width: 100%;
    margin-top: 1.15rem;
    padding-top: 0;
    border-top: none;
  }
  .env-toolbar-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    justify-content: flex-end;
    margin-left: auto;
  }
  a.btn.env-toolbar-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    box-sizing: border-box;
  }

  .btn {
    border: none;
    cursor: pointer;
    font-weight: 700;
    font-size: 0.88rem;
    font-family: var(--sans);
    padding: 0.65rem 1.15rem;
    border-radius: var(--radius-sm);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.2s ease;
  }
  .b1 {
    background: var(--accent-brand-gradient);
    color: #fff;
    box-shadow: 0 4px 16px rgba(108,92,231,0.3);
  }
  .b1:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(108,92,231,0.38); }
  .b1:disabled { opacity: 0.45; cursor: not-allowed; }
  .b2 {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border-glass);
    box-sizing: border-box;
  }
  :root.theme-light .b2 { background: #fff; border-color: rgba(0,0,0,0.12); }
  :root.theme-light .b2:hover { background: rgba(0,0,0,0.03); }

  .btn-back-chat {
    background: rgba(166,227,161,0.14);
    border: 1px solid rgba(166,227,161,0.42);
    color: #6ee7b7;
    font-weight: 700;
  }
  .btn-back-chat:hover {
    border-color: rgba(166,227,161,0.55);
    color: #a7f3d0;
  }
  :root.theme-light .btn-back-chat {
    background: rgba(16,185,129,0.14);
    border-color: rgba(5,150,105,0.38);
    color: #047857;
  }
  :root.theme-light .btn-back-chat:hover {
    color: #065f46;
    border-color: rgba(5,150,105,0.5);
  }

  .mcp-page-help-footer { margin-top: 1.35rem; text-align: center; }
  .mcp-help-inline-btn {
    background: none;
    border: none;
    padding: 0;
    font: inherit;
    font-size: 0.68rem;
    color: var(--text-tertiary);
    line-height: 1.5;
    cursor: default;
    opacity: 0.92;
  }
</style>
</head>
<body>
<div class="neo"><div class="orb"></div><div class="orb orb2"></div></div>
<div class="grid" aria-hidden="true"></div>
<div class="w">
<div class="hd"><h1>MCP 服务器配置</h1><div class="pth" id="cfg-path"></div></div>
<p class="fh">编辑 <code>mcp_servers.json</code>。支持 <strong>stdio</strong>（<code>command</code> + <code>args</code>）、<strong>sse</strong> 与 <strong>streamable-http</strong>（<code>url</code> + 可选 <code>headers</code>）。保存后会自动重载 MCP 连接。<br>
若设置了环境变量 <code>MCP_SERVERS_JSON</code>，运行时优先使用该变量，此处文件不会生效。</p>
<div class="cd">
<div id="status" class="st"></div>
<textarea id="json" class="mono" spellcheck="false" autocomplete="off" placeholder='{\n  "enabled": true,\n  "servers": { }\n}'></textarea>
</div>
<div class="env-toolbar">
<button type="button" class="btn btn-back-chat js-back-chat">返回聊天</button>
<div class="env-toolbar-actions">
<button type="button" class="btn b1" id="btn-save">保存并重载</button>
<button type="button" class="btn b2" id="btn-reload">放弃修改并重新加载</button>
<a href="/setup" class="btn b2 env-toolbar-link">配置向导</a>
<a href="/setup/env" class="btn b2 env-toolbar-link">返回高级设置</a>
</div>
</div>
<p class="mcp-page-help-footer"><button type="button" class="mcp-help-inline-btn" tabindex="-1">需要帮助请联系@wushuge 00612259</button></p>
</div>
<script>
(function(){
var pathEl=document.getElementById('cfg-path'),ta=document.getElementById('json'),st=document.getElementById('status');
function showSt(m,ok){st.textContent=m||'';st.className=m?('st '+(ok?'ok':'e')):'';st.style.display=m?'block':'none';}
async function load(){showSt('',false);try{
var r=await fetch('/api/mcp_config',{credentials:'same-origin'});var j=await r.json();
if(!j.ok)throw new Error(j.error||'加载失败');
pathEl.textContent='路径：'+(j.path||'')+(j.exists?'':'（文件不存在，保存时将创建）');
ta.value=j.text!=null?j.text:'';
}catch(e){showSt(String(e.message||e),false);}}
document.getElementById('btn-reload').addEventListener('click',load);
document.getElementById('btn-save').addEventListener('click',async function(){
showSt('',false);var b=this;b.disabled=true;
try{var r=await fetch('/api/mcp_config',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({text:ta.value})});var j=await r.json();
if(!j.ok)throw new Error(j.error||'保存失败');showSt('已保存并重载 MCP。',true);}
catch(e){showSt(String(e.message||e),false);}
finally{b.disabled=false;}
});
load();
})();
</script>
<script>
(function () {
  function goBack(e) {
    e.preventDefault();
    if (window.opener && !window.opener.closed) {
      try { window.opener.focus(); } catch (x) {}
      window.close();
    } else {
      window.location.href = '/';
    }
  }
  var backs = document.querySelectorAll('.js-back-chat');
  var bi;
  for (bi = 0; bi < backs.length; bi++) {
    backs[bi].addEventListener('click', goBack);
  }
})();
</script>
</body>
</html>
