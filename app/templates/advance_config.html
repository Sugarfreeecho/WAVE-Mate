<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyAgent · 高级设置</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script>try { if (localStorage.getItem('myagent-theme') !== 'dark') document.documentElement.classList.add('theme-light'); } catch (e) { document.documentElement.classList.add('theme-light'); }</script>
<style>
  /* ═══ 与 index.html 一致 ═══ */
  :root {
    --space-bg: #1e1e2e;
    --surface-glass: rgba(22, 22, 36, 0.96);
    --surface-glass2: rgba(40, 40, 60, 0.94);
    --surface-glass3: rgba(62, 63, 86, 0.78);
    --border-glass: rgba(205, 214, 244, 0.055);
    --border-accent: rgba(203, 166, 247, 0.22);
    --text-primary: #cdd6f4;
    --text-secondary: #a6adc8;
    --text-tertiary: #6c7086;
    --accent-gradient: linear-gradient(135deg, #b4befe 0%, #cba6f7 50%, #dac2f0 100%);
    --accent-glow: rgba(203, 166, 247, 0.28);
    --accent-brand-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
    --accent-brand-glow: rgba(108, 92, 231, 0.28);
    --shadow-brand-glow: 0 4px 24px rgba(108, 92, 231, 0.18);
    --border-brand-accent: rgba(124, 111, 247, 0.22);
    --code-surface-bg: #1c1d2e;
    --green-accent: #a6e3a1;
    --red-accent: #f38ba8;
    --sans: 'Plus Jakarta Sans', -apple-system, system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --radius-sm: 8px;
    --radius-md: 14px;
    --shadow-soft: 0 10px 44px rgba(0,0,0,0.38);
    --shadow-glow: 0 4px 24px rgba(203, 166, 247, 0.18);
  }
  :root.theme-light {
    --space-bg: #e4e9f2;
    --surface-glass: rgba(255, 255, 255, 0.93);
    --surface-glass2: rgba(255, 255, 255, 0.98);
    --surface-glass3: rgba(242, 245, 250, 0.98);
    --border-glass: rgba(0, 0, 0, 0.09);
    --text-primary: #0e0f1a;
    --text-secondary: #282a3a;
    --text-tertiary: #484a5e;
    --shadow-soft: 0 12px 40px rgba(0, 0, 0, 0.1), 0 2px 10px rgba(0, 0, 0, 0.04);
    --shadow-glow: 0 4px 22px rgba(99, 102, 241, 0.16);
    --accent-glow: rgba(99, 102, 241, 0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 14px; background: var(--space-bg); }
  body {
    font-family: var(--sans);
    background: var(--space-bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding-bottom: 3rem;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.09); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }
  ::-webkit-scrollbar-corner { background: transparent; }
  ::-webkit-scrollbar-button { width: 0; height: 0; display: none; }
  :root.theme-light ::-webkit-scrollbar-thumb { background: rgba(15, 23, 42, 0.08); border-radius: 8px; }
  :root.theme-light ::-webkit-scrollbar-thumb:hover,
  :root.theme-light ::-webkit-scrollbar-thumb:active { background: rgba(15, 23, 42, 0.22); }

  .neo { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .orb {
    position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.42;
    width: 460px; height: 460px; top: -8%; left: -6%; background: rgba(108, 92, 231, 0.12);
  }
  .orb2 {
    width: 340px; height: 340px; bottom: -4%; right: -4%; background: rgba(139, 92, 246, 0.1);
  }
  :root.theme-light .orb { opacity: 0.22; filter: blur(96px); }
  .grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 32px 32px;
  }
  :root.theme-light .grid {
    background-image:
      linear-gradient(rgba(0, 0, 0, 0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 0, 0, 0.035) 1px, transparent 1px);
  }

  .w { position: relative; z-index: 2; max-width: 720px; margin: 0 auto; padding: 2rem 1.25rem; }

  .hd { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 1rem; margin-bottom: 1.5rem; }
  .hd h1 {
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #f0eff5 0%, #c8c6d6 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  :root.theme-light .hd h1 {
    background: linear-gradient(135deg, #1f1f2e 0%, #4f46e5 55%, #6366f1 100%);
    -webkit-background-clip: text;
    background-clip: text;
  }
  .pth { font-size: 0.75rem; color: var(--text-tertiary); word-break: break-all; margin-top: 0.35rem; }

  nav a {
    font-size: 0.82rem; font-weight: 600; color: var(--text-secondary);
    text-decoration: none; padding: 0.4rem 0.75rem; border-radius: var(--radius-sm);
    border: 1px solid var(--border-glass); background: rgba(255,255,255,0.04);
    transition: border-color 0.18s ease, color 0.18s ease;
  }
  :root.theme-light nav a { background: rgba(0,0,0,0.03); }
  nav a:hover {
    border-color: rgba(99,102,241,0.38); color: var(--text-primary);
  }

  .cd {
    background: var(--surface-glass3);
    border: 1px solid var(--border-glass);
    border-radius: var(--radius-md);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    padding: 1.15rem 1.2rem;
    margin-bottom: 0.75rem;
    box-shadow: var(--shadow-soft);
  }
  :root.theme-light .cd { box-shadow: var(--shadow-soft), 0 1px 0 rgba(255,255,255,0.75) inset; }

  .st { display: none; margin-bottom: 1rem; padding: 0.65rem; border-radius: var(--radius-sm); font-size: 0.85rem; font-weight: 500; }
  .st.e {
    display: block;
    background: rgba(243,139,168,0.12); border: 1px solid rgba(243,139,168,0.28); color: var(--red-accent);
  }
  .st.ok {
    display: block;
    background: rgba(166,227,161,0.12); border: 1px solid rgba(166,227,161,0.26); color: var(--green-accent);
  }
  :root.theme-light .st.e {
    background: rgba(254,226,226,0.85); border-color: rgba(248,113,113,0.35); color: #991b1b;
  }
  :root.theme-light .st.ok {
    background: rgba(209,250,229,0.9); border-color: rgba(52,211,153,0.35); color: #065f46;
  }

  .sec { margin-bottom: 1.25rem; }
  .tit {
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--text-tertiary); margin-bottom: 0.55rem; padding-bottom: 0.35rem;
    border-bottom: 1px solid var(--border-glass);
  }
  .fd { margin-bottom: 1rem; }
  .fk { font-family: var(--mono); font-size: 0.78rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 0.3rem; }
  .fh { font-size: 0.72rem; color: var(--text-tertiary); line-height: 1.45; margin-bottom: 0.35rem; white-space: pre-wrap; }

  .ip, .tx {
    width: 100%; padding: 0.55rem 0.7rem; border-radius: var(--radius-sm);
    border: 1px solid var(--border-glass); background: var(--surface-glass2);
    color: var(--text-primary); font-family: var(--mono); font-size: 0.8rem;
    outline: none;
    transition: border-color 0.18s ease, box-shadow 0.18s ease;
  }
  .tx { min-height: 4.2rem; resize: vertical; }
  .ip:focus, .tx:focus {
    border-color: rgba(99,102,241,0.45); box-shadow: 0 0 0 3px rgba(99,102,241,0.15), var(--shadow-glow);
  }
  :root.theme-light .ip, :root.theme-light .tx {
    background: #fff; border-color: rgba(0,0,0,0.12);
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  :root.theme-light .ip:focus, :root.theme-light .tx:focus {
    box-shadow: 0 0 0 3px rgba(99,102,241,0.14);
  }

  .pw { display: flex; gap: 0.35rem; }
  .tg {
    flex-shrink: 0; padding: 0 0.6rem; border-radius: var(--radius-sm);
    border: 1px solid var(--border-glass); background: rgba(255,255,255,0.05);
    color: var(--text-secondary); font-size: 0.72rem; font-weight: 600; cursor: pointer;
    font-family: var(--sans);
    transition: background 0.15s ease;
  }
  .tg:hover { background: rgba(108,92,231,0.12); color: var(--text-primary); }
  :root.theme-light .tg { background: rgba(0,0,0,0.04); }
  :root.theme-light .tg:hover { background: rgba(0,0,0,0.06); }

  .ac { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-top: 1.2rem; padding-top: 1rem; border-top: 1px solid var(--border-glass); }
  .btn {
    border: none; cursor: pointer; font-weight: 700; font-size: 0.88rem;
    font-family: var(--sans); padding: 0.65rem 1.15rem; border-radius: var(--radius-sm);
    transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.2s ease;
  }
  .b1 { background: var(--accent-brand-gradient); color: #fff; box-shadow: 0 4px 16px rgba(108,92,231,0.3); }
  .b1:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(108,92,231,0.38); }
  .b1:disabled { opacity: 0.45; cursor: not-allowed; }
  .b2 { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-glass); }
  :root.theme-light .b2 { background: #fff; border-color: rgba(0,0,0,0.12); }
  :root.theme-light .b2:hover { background: rgba(0,0,0,0.03); }

  .hi { text-align: center; padding: 1.2rem; color: var(--text-tertiary); font-size: 0.85rem; }

  .env-toast {
    position: fixed; bottom: 1.85rem; left: 50%; transform: translateX(-50%); z-index: 9999;
    max-width: min(90vw, 22rem); padding: 0.45rem 0.95rem; font-size: 0.8rem;
    font-family: var(--sans); color: var(--text-primary);
    background: rgba(22,22,38,0.94); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(99,102,241,0.35); border-radius: var(--radius-sm);
    box-shadow: var(--shadow-soft); opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
  }
  :root.theme-light .env-toast {
    background: rgba(255,255,255,0.97); border-color: rgba(99,102,241,0.28);
  }
  .env-toast.show { opacity: 1; }

  .env-toolbar.ac {
    margin-top: 0; justify-content: space-between; align-items: center; flex-wrap: wrap;
    gap: 0.75rem; width: 100%; border-top: none; padding-top: 0;
  }
  .env-toolbar.env-toolbar--top.ac { padding-top: 0; border-top: none; margin-bottom: 1rem; }
  .env-toolbar-actions { display: flex; flex-wrap: wrap; gap: 0.6rem; justify-content: flex-end; margin-left: auto; }
  .env-toolbar--bottom { margin-top: 2.75rem; padding-top: 1.5rem; border-top: 1px solid var(--border-glass); }

  .btn-back-chat {
    background: rgba(166,227,161,0.14); border: 1px solid rgba(166,227,161,0.42); color: #a6e3a1; font-weight: 700;
  }
  .btn-back-chat:hover { border-color: rgba(166,227,161,0.55); color: #b8f0b5; }
  :root.theme-light .btn-back-chat {
    background: rgba(16,185,129,0.14); border-color: rgba(5,150,105,0.38); color: #047857;
  }
  :root.theme-light .btn-back-chat:hover { color: #065f46; border-color: rgba(5,150,105,0.5); }

  a.btn.env-toolbar-link {
    display: inline-flex; align-items: center; justify-content: center;
    text-decoration: none; box-sizing: border-box;
  }

  .env-page-help-footer { margin-top: 1.35rem; text-align: center; }
  .env-help-inline-btn {
    background: none; border: none; padding: 0; font: inherit; font-size: 0.68rem;
    color: var(--text-tertiary); line-height: 1.5; cursor: default; opacity: 0.92;
  }

.clr {
    color: #ff6b6b;
    border-color: rgba(255, 107, 107, 0.3);
}
.clr:hover {
    background: rgba(255, 107, 107, 0.15);
    border-color: rgba(255, 107, 107, 0.5);
}
</style>
</head>
<body>
<div class="neo"><div class="orb"></div><div class="orb orb2"></div></div>
<div class="grid" aria-hidden="true"></div>
<div class="w">
<div class="hd"><div><h1>高级设置</h1><div class="pth" id="env-path"></div></div></div>
<div class="ac env-toolbar env-toolbar--top" style="display:none">
<button type="button" class="btn btn-back-chat js-back-chat">返回聊天</button>
<div class="env-toolbar-actions">
<button type="button" class="btn b1 js-save-env">保存设置</button>
<button type="button" class="btn b2 js-reload-env">重新设置</button>
<a href="/setup" class="btn b2 env-toolbar-link">配置向导</a>
<a href="/setup/mcp" class="btn b2 env-toolbar-link">MCP 配置</a>
</div>
</div>
<div class="cd">
<div id="status" class="st"></div>
<div id="root"><p class="hi">正在加载…</p></div>
</div>
<div class="ac env-toolbar env-toolbar--bottom" style="display:none">
<button type="button" class="btn btn-back-chat js-back-chat">返回聊天</button>
<div class="env-toolbar-actions">
<button type="button" class="btn b1 js-save-env">保存设置</button>
<button type="button" class="btn b2 js-reload-env">重新设置</button>
<a href="/setup" class="btn b2 env-toolbar-link">配置向导</a>
<a href="/setup/mcp" class="btn b2 env-toolbar-link">MCP 配置</a>
</div>
</div>
<p class="env-page-help-footer"><button type="button" class="env-help-inline-btn" tabindex="-1">需要帮助请联系@wushuge 00612259</button></p>
</div>
<script>
(function(){function showToast(m){var el=document.getElementById('env-toast');if(!el)return;el.textContent=m||'';el.classList.add('show');if(el._tm)clearTimeout(el._tm);el._tm=setTimeout(function(){el.classList.remove('show');},2200);}
var R=document.getElementById("root"),S=document.getElementById("status"),TBS=document.querySelectorAll(".env-toolbar");
function setToolbarVis(on){var i;for(i=0;i<TBS.length;i++)TBS[i].style.display=on?"flex":"none";}
function st(m,k){S.textContent=m||"";S.className=m?("st "+(k||"e")):"";S.style.display=m?"block":"none";}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}
function show(groups){
if(!groups||!groups.length){R.innerHTML="<p class='hi'>.env 中暂无可解析的 KEY=value 行。</p>";setToolbarVis(true);return;}
var h="",i,j,g,v,sensitiveHasValue={};
for(i=0;i<groups.length;i++){
g=groups[i];
h+="<section class='sec'><div class='tit'>"+esc(g.title)+"</div>";
for(j=0;j<g.vars.length;j++){
v=g.vars[j];
h+="<div class='fd'><div class='fk'>"+esc(v.key)+"</div>";
if(v.hint)h+="<div class='fh'>"+esc(v.hint)+"</div>";
if(v.sensitive){
if(v.has_value)sensitiveHasValue[v.key]=true;
h+="<div class='pw'><input type='password' class='ip' data-k='"+esc(v.key)+"' value='"+esc(v.value)+"' autocomplete='off'><button type='button' class='tg clr' data-t='"+esc(v.key)+"'>清空</button></div>";
}else if((v.value&&v.value.length>140)||v.key.indexOf("JSON")>=0||v.key.indexOf("BODY")>=0){
var pk=v.path_kind?" data-path-kind='"+esc(v.path_kind)+"'":"";
h+="<textarea class='tx' data-k='"+esc(v.key)+"'"+pk+" autocomplete='off'>"+esc(v.value)+"</textarea>";
}else{
var pk2=v.path_kind?" data-path-kind='"+esc(v.path_kind)+"'":"";
h+="<input type='text' class='ip' data-k='"+esc(v.key)+"'"+pk2+" value='"+esc(v.value)+"' autocomplete='off'>";
}
h+="</div>";
}
h+="</section>";
}
R.innerHTML=h;setToolbarVis(true);
if(window.MyAgentPathPicker)window.MyAgentPathPicker.scan(R);
var P=R.querySelectorAll(".pw input[data-k]"),pidx,pkey;for(pidx=0;pidx<P.length;pidx++){pkey=P[pidx].getAttribute("data-k");if(sensitiveHasValue[pkey])P[pidx].placeholder="API已设置，如需修改请直接输入并保存设置";}
var T=R.querySelectorAll(".tg"),t,btn,key,inp;
for(t=0;t<T.length;t++){
T[t].addEventListener("click",function(ev){
btn=ev.currentTarget;key=btn.getAttribute("data-t");
inp=R.querySelector("[data-k='"+key.replace(/\\/g,"\\\\").replace(/'/g,"\\'")+"']");
if(!inp)return;
inp.value="";inp.type="password";inp.focus();
});
}
}
function coll(){var o={},els=R.querySelectorAll("[data-k]"),i,el;for(i=0;i<els.length;i++){el=els[i];if(el.type==="password"&&!el.value)continue;o[el.getAttribute("data-k")]=el.value;}return o;}
async function load(){st("","");R.innerHTML="<p class='hi'>正在加载…</p>";setToolbarVis(false);
try{var r=await fetch("/api/env",{credentials:"same-origin"}),j=await r.json();
if(!j.ok)throw new Error(j.error||"加载失败");
var pe=document.getElementById("env-path");if(pe)pe.textContent="配置文件："+(j.path||"");show(j.groups||[]);}
catch(e){R.innerHTML="<p class='hi'>无法读取</p>";st(String(e.message||e),"e");setToolbarVis(true);}}
async function sav(){st("");var saves=R.ownerDocument.querySelectorAll(".js-save-env"),i;for(i=0;i<saves.length;i++)saves[i].disabled=true;
try{var r=await fetch("/api/env",{method:"POST",headers:{"Content-Type":"application/json"},credentials:"same-origin",body:JSON.stringify({values:coll()})});var j=await r.json();
if(j.ok&&j.restart_required){showToast("配置已保存；WORK_DIR 重启服务后生效。");alert("WORK_DIR 已保存，重启服务后生效。");return;}
if(!j.ok)throw new Error(j.error||"保存失败");showToast("配置已保存，已应用到当前运行进程；主界面进度条请刷新首页后同步。");}
catch(e){st(String(e.message||e),"e");}finally{for(i=0;i<saves.length;i++)saves[i].disabled=false;}}
var sv=R.ownerDocument.querySelectorAll(".js-save-env"),rv=R.ownerDocument.querySelectorAll(".js-reload-env"),ix;for(ix=0;ix<sv.length;ix++)sv[ix].addEventListener("click",sav);for(ix=0;ix<rv.length;ix++)rv[ix].addEventListener("click",load);load();
})();
</script>
<div id="env-toast" class="env-toast" role="status" aria-live="polite"></div>
<script>
(function () {
  function goBack(e) {
    e.preventDefault();
    if (window.opener && !window.opener.closed) {
      try { window.opener.focus(); } catch (x) {}
      window.close();
    } else {
      window.location.href = '/';
    }
  }
  var backs = document.querySelectorAll('.js-back-chat');
  var bi;
  for (bi = 0; bi < backs.length; bi++) {
    backs[bi].addEventListener('click', goBack);
  }
})();
</script>
</body></html>
